name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  verify:
    name: Verify (native TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node --experimental-strip-types scripts/test-logic.ts
      - run: node --experimental-strip-types scripts/spike.ts
      - name: Adapter-conformance (RFC-0006 §3.1)
        run: node --experimental-strip-types scripts/adapter-conformance.ts
      - name: GraphQL + ACP adapters (RFC-0006 §3, RFC-0005)
        run: node --experimental-strip-types scripts/adapter-graphql-acp.ts
      - name: OpenAPI adapter (RFC-0006 §3.1/§4)
        run: node --experimental-strip-types scripts/adapter-openapi.ts
      - name: Agentic support flow (RFC-0007)
        run: node --experimental-strip-types scripts/support-flow.ts
      - name: Validator on fixtures
        run: for f in test/fixtures/*.json; do node scripts/validate.mjs "$f"; done
  build:
    name: Build (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npm run build
      # Runs here (not in verify) because it imports the server handler, which resolves
      # the bare "@ai2web/core" package specifier - available only after install + build.
      - name: Multi-surface serving (RFC-0015 - llms.txt + agent.json)
        run: node --experimental-strip-types scripts/test-server.ts
      - name: Framework adapters (Hono / Astro / Nuxt)
        run: node --experimental-strip-types scripts/adapter-frameworks.ts
