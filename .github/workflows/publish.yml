name: Publish to npm

# Publishes every @ai2web/* package to npm. Triggered when you publish a GitHub Release,
# or manually from the Actions tab (Run workflow). Requires an NPM_TOKEN repo secret
# (an npm "Automation" token, which bypasses the interactive 2FA prompt).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # enables npm provenance (public packages, public repo)

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      # Publish only workspaces whose current version is not already on npm. This makes releasing
      # a newly added package (e.g. @ai2web/ap2-adapter) - or bumping a subset - work without
      # `npm publish` erroring on packages whose version is already published. Idempotent: safe to
      # re-run. Each package.json sets publishConfig.access = public.
      - name: Publish changed workspaces
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            if [ "$(node -p "require('./${dir}package.json').private === true")" = "true" ]; then
              continue
            fi
            name=$(node -p "require('./${dir}package.json').name")
            version=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "skip ${name}@${version} (already published)"
            else
              echo "publish ${name}@${version}"
              npm publish -w "${name}" --access public --provenance
            fi
          done
